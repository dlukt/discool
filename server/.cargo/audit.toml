[advisories]
# RUSTSEC-2023-0071 (rsa Marvin Attack) has no fixed upgrade available.
# It's pulled in via `sqlx-mysql` but Discool only supports Postgres + SQLite.
# RUSTSEC-2026-0118 and RUSTSEC-2026-0119 are in `hickory-proto` pulled in by
# optional libp2p DNS/mDNS crates in libp2p 0.56.0's lock resolution.
# We do not use DNS/mDNS behaviour, and we're waiting for an upstream libp2p
# release that updates the affected hickory dependency line.
# RUSTSEC-2024-0436 (paste) is a compile-time proc-macro, unmaintained but
# no vulnerability. Pulled by netlink-packet-core → if-watch → libp2p.
ignore = ["RUSTSEC-2023-0071", "RUSTSEC-2026-0118", "RUSTSEC-2026-0119", "RUSTSEC-2024-0436"]
