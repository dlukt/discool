# Discool example configuration (TOML)
#
# This file documents ALL supported config keys and their defaults.
# You can keep it empty (or omit config files entirely) and the server will run
# with defaults, except `database.url` which is required.
#
# Config load order (lowest → highest priority):
#   1) /etc/discool/config.toml
#   2) ./config.toml
#   3) $DISCOOL_CONFIG (custom path; highest file priority)
#   4) Environment variables (highest priority)
#
# Environment variable mapping:
#   - Prefix: DISCOOL_
#   - Nested separator: __ (double underscore)
#
# Docker tip:
# - In `docker-compose.yml`, set these under `services.discool.environment`.
# - For a persistent config file, mount: `./config.toml:/etc/discool/config.toml:ro`
#
# Examples:
#   DISCOOL_SERVER__PORT=8080
#   DISCOOL_SERVER__HOST=127.0.0.1
#   DISCOOL_LOG__LEVEL=debug
#   DISCOOL_LOG__FORMAT=pretty
#   DISCOOL_DATABASE__URL=sqlite::memory:
#   DISCOOL_METRICS__ENABLED=true
#   DISCOOL_BACKUP__OUTPUT_DIR=/var/backups/discool
#   DISCOOL_EMAIL__SMTP_HOST=smtp.example.com
#   DISCOOL_EMAIL__SMTP_PORT=587
#   DISCOOL_EMAIL__SMTP_USERNAME=mailer
#   DISCOOL_EMAIL__SMTP_PASSWORD=supersecret
#   DISCOOL_EMAIL__FROM_ADDRESS=no-reply@example.com
#   DISCOOL_EMAIL__FROM_NAME=Discool
#   DISCOOL_EMAIL__VERIFICATION_URL_BASE=https://chat.example.com/api/v1/auth/recovery-email/verify
#   DISCOOL_EMAIL__TOKEN_TTL_SECONDS=900
#   DISCOOL_EMAIL__START_RATE_LIMIT_PER_HOUR=5
#   DISCOOL_EMAIL__VERIFY_RATE_LIMIT_PER_HOUR=20
#   DISCOOL_EMAIL__SERVER_SECRET=change-me-in-production
#
# Note: For log filtering, the standard Rust `RUST_LOG` env var overrides
# `log.level` (debugging escape hatch).
#
# ---------------------------------------------------------------------------
# [server]
# ---------------------------------------------------------------------------
# Server bind host (default: "0.0.0.0")
# host = "0.0.0.0"
#
# Server bind port (default: 3000)
# port = 3000
#
# ---------------------------------------------------------------------------
# [p2p]
# ---------------------------------------------------------------------------
# Enable P2P subsystem startup (default: true)
# enabled = true
#
# P2P listen host (default: "0.0.0.0")
# listen_host = "0.0.0.0"
#
# P2P listen port (default: 4001; separate from [server].port)
# listen_port = 4001
#
# Path to persisted instance libp2p private key (default: "./data/p2p/identity.key")
# identity_key_path = "./data/p2p/identity.key"
#
# Optional bootstrap peers for Kademlia discovery (multiaddr with /p2p peer ID)
# bootstrap_peers = [
#   "/ip4/203.0.113.10/tcp/4001/p2p/12D3KooWExamplePeerId1111111111111111111111111",
#   "/dns4/bootstrap.discool.example/tcp/4001/p2p/12D3KooWExamplePeerId2222222222222222222222222"
# ]
#
# Exponential backoff retry settings for discovery bootstrap (defaults: 2s initial, 60s max, 500ms jitter)
# discovery_retry_initial_secs = 2
# discovery_retry_max_secs = 60
# discovery_retry_jitter_millis = 500
#
# Periodic discovery refresh interval in seconds (default: 15)
# discovery_refresh_interval_secs = 15
#
# Gossipsub mesh defaults tuned for small-to-medium networks (tens to hundreds of instances)
# Must satisfy: gossip_mesh_n_low <= gossip_mesh_n <= gossip_mesh_n_high
# gossip_mesh_n_low = 5
# gossip_mesh_n = 6
# gossip_mesh_n_high = 12
#
# ---------------------------------------------------------------------------
# [log]
# ---------------------------------------------------------------------------
# Log filter directive (default: "info")
# level = "info"
#
# Log output format (default: "json")
# format = "json" # json | pretty

# ---------------------------------------------------------------------------
# [database]
# ---------------------------------------------------------------------------
# Database connection URL (required)
# url = "postgres://user:pass@localhost:5432/discool"
# url = "postgres://discool:discool@postgres:5432/discool" # docker-compose service name
# url = "sqlite://./data/discool.db"
# url = "sqlite::memory:" # useful for tests
#
# Connection pool max connections (default: 5)
# max_connections = 5

# ---------------------------------------------------------------------------
# [metrics]
# ---------------------------------------------------------------------------
# Expose Prometheus metrics at GET /metrics (default: false)
# enabled = false

# ---------------------------------------------------------------------------
# [backup]
# ---------------------------------------------------------------------------
# Optional directory to also save backups created via POST /api/v1/admin/backup.
# output_dir = "/var/backups/discool"

# ---------------------------------------------------------------------------
# [auth]
# ---------------------------------------------------------------------------
# Session TTL in hours (default: 168 = 7 days)
# session_ttl_hours = 168
#
# Challenge TTL in seconds (default: 300 = 5 minutes)
# challenge_ttl_seconds = 300

# ---------------------------------------------------------------------------
# [avatar]
# ---------------------------------------------------------------------------
# Server-managed avatar storage directory (default: "./data/avatars")
# upload_dir = "./data/avatars"
#
# Maximum allowed avatar upload size in bytes (default: 2097152 = 2 MB)
# max_size_bytes = 2097152

# ---------------------------------------------------------------------------
# [email]
# ---------------------------------------------------------------------------
# SMTP host. Use "stub" for local/dev tests without actual delivery.
# smtp_host = "stub"
#
# SMTP port (default: 1025)
# smtp_port = 1025
#
# Optional SMTP auth (set both or neither)
# smtp_username = "mailer"
# smtp_password = "secret"
#
# Sender identity for verification emails
# from_address = "no-reply@discool.local"
# from_name = "Discool"
#
# Base URL used for verification links in emails
# verification_url_base = "http://localhost:3000/api/v1/auth/recovery-email/verify"
#
# Base URL used for identity recovery links (opens the SPA with recovery_token query param)
# recovery_url_base = "http://localhost:3000/"
#
# Verification token TTL in seconds (default: 900 = 15 minutes)
# token_ttl_seconds = 900
#
# Per-user and per-IP initiation limit (default: 5 per hour)
# start_rate_limit_per_hour = 5
#
# Per-IP verification attempt limit (default: 20 per hour)
# verify_rate_limit_per_hour = 20
#
# Secret used to derive server-side recovery encryption keys (required in production)
# server_secret = "change-me-in-production"
